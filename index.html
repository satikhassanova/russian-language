<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MusicMind</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #4A90E2, #9013FE);
    color: white;
    text-align: center;
}

.container {
    padding: 40px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

.choice-btn {
    background: white;
    color: black;
}

.choice-btn:hover {
    background: #ddd;
}

.hidden {
    display: none;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    margin: 20px auto;
    width: 320px;
}
</style>
</head>

<body>

<div class="container">

<!-- СТАРТ -->
<div id="start">
    <h1>🎧 MusicMind</h1>
    <p>Узнай своё музыкальное состояние</p>
    <button onclick="startTest()">Начать</button>
</div>

<!-- ВЫБОР -->
<div id="mood" class="hidden">
    <h2>Выбери, что тебе ближе</h2>
    <button class="choice-btn" onclick="setMood('happy')">😊 Радость</button>
    <button class="choice-btn" onclick="setMood('sad')">😢 Грусть</button>
    <button class="choice-btn" onclick="setMood('calm')">🌿 Спокойствие</button>
</div>

<!-- МУЗЫКА -->
<div id="music" class="hidden">
    <h2>Слушай музыку</h2>

    <div class="card">
        <p id="trackName"></p>
        <iframe id="player" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src=""></iframe>
    </div>

    <button onclick="react()">➡️ Следующая</button>
</div>

<!-- РЕЗУЛЬТАТ -->
<div id="result" class="hidden">
    <h2>✨ Твоё состояние</h2>
    <p id="resultText"></p>
    <button onclick="location.reload()">Пройти снова</button>
</div>

</div>

<script>

let mood = "";
let index = 0;

let tracks = [];

function startTest() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("mood").classList.remove("hidden");
}

function setMood(m) {
    mood = m;
    index = 0;

    document.getElementById("mood").classList.add("hidden");
    document.getElementById("music").classList.remove("hidden");

    const base = "https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/";
    const params = "&color=%23ff5500&auto_play=true&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false";

    if (mood === "happy") {
        tracks = [
            {name: "Happy — Pharrell Williams", embed: base + "simplythree/happy-pharrell-williams" + params},
            {name: "I Feel It Coming — The Weeknd", embed: base + "theweeknd/i-feel-it-coming-1" + params}
        ];
    }

    if (mood === "sad") {
        tracks = [
            {name: "Slow Dancing in the Dark — Joji", embed: base + "jojiofficial/slow-dancing-in-the-dark" + params},
            {name: "Back to Friends — sombr", embed: base + "sombrsongs/back-to-friends" + params}
        ];
    }

    if (mood === "calm") {
        tracks = [
            {name: "Heart to Heart — Mac DeMarco", embed: base + "mac-demarco-official/heart-to-heart" + params},
            {name: "Qolshatyr — Rusha, M’Dee", embed: base + "qpalzmtyty/rusha-mdee-qolshatyr-speed-up" + params}
        ];
    }

    loadTrack();
}

function loadTrack() {
    document.getElementById("trackName").innerText = tracks[index].name;
    document.getElementById("player").src = tracks[index].embed;
}

function react() {
    index++;

    if (index < tracks.length) {
        loadTrack();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("music").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    let text = "";

    if (mood === "happy") {
        text = "😊 Ты радостный человек — тебе важно движение, энергия и позитив.";
    }

    if (mood === "sad") {
        text = "😢 Ты грустный человек — ты глубоко чувствуешь эмоции и музыку.";
    }

    if (mood === "calm") {
        text = "🌿 Ты спокойный человек — тебе комфортны тишина и баланс.";
    }

    document.getElementById("resultText").innerText = text;
}

</script>

</body>
</html>
